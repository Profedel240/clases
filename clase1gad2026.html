                    class="flex items-center gap-4 px-4 py-3 rounded-2xl text-left border-4 border-black font-black uppercase text-sm transition-all duration-200 
                    ${activeTab === item.id 
                        ? 'bg-yellow-300 text-black shadow-[4px_4px_0px_0px_rgba(0,0,0,1)] translate-x-1' 
                        : 'bg-white text-black hover:bg-pink-200 hover:-translate-y-1 hover:shadow-[4px_4px_0px_0px_rgba(0,0,0,1)]'
                    }"
                >
                    <span class="p-1 rounded-full border-2 border-black ${activeTab === item.id ? 'bg-white' : 'bg-transparent'}">
                        <i data-lucide="${item.icon}" class="w-5 h-5"></i>
                    </span>
                    ${item.title}
                </button>
            `).join('');

            const comparativoBtnHtml = `
                <div class="mt-4 pt-4 border-t-4 border-black border-dashed">
                    <button
                        onclick="setActiveTab('comparativo')"
                        class="w-full flex items-center gap-4 px-4 py-4 rounded-2xl text-left border-4 border-black font-black uppercase text-sm transition-all duration-200
                        ${activeTab === 'comparativo' 
                            ? 'bg-purple-400 text-white shadow-[4px_4px_0px_0px_rgba(0,0,0,1)] translate-x-1' 
                            : 'bg-white text-black hover:bg-purple-300 hover:-translate-y-1 hover:shadow-[4px_4px_0px_0px_rgba(0,0,0,1)]'
                        }"
                    >
                        <span class="p-1 rounded-full border-2 border-black ${activeTab === 'comparativo' ? 'bg-white text-purple-600' : 'bg-transparent'}">
                            <i data-lucide="layout-grid" class="w-5 h-5"></i>
                        </span>
                        Ver Resumen
                    </button>
                </div>
            `;

            document.getElementById('sidebar-nav').innerHTML = sidebarHtml + comparativoBtnHtml;
        }

        function renderContent() {
            const contentArea = document.getElementById('content-area');

            if (activeTab === 'comparativo') {
                contentArea.innerHTML = `
                    <div class="space-y-8 animate-fade-in">
                        <div class="flex flex-col md:flex-row items-center gap-4 mb-8 pb-8 border-b-4 border-black">
                            <div class="p-4 bg-yellow-300 text-black rounded-2xl border-4 border-black shadow-[4px_4px_0px_0px_rgba(0,0,0,1)] transform -rotate-6">
                                <i data-lucide="layout-grid" class="w-8 h-8"></i>
                            </div>
                            <div>
                                <h2 class="text-3xl md:text-4xl font-black text-black uppercase tracking-tight">El Gran Cuadro Comparativo</h2>
                                <p class="text-black font-bold mt-2 bg-pink-200 inline-block px-3 py-1 border-2 border-black rounded-full text-sm md:text-base">¡Todo el módulo en un solo vistazo!</p>
                            </div>
                        </div>

                        <div class="bg-white rounded-3xl border-4 border-black shadow-[8px_8px_0px_0px_rgba(0,0,0,1)] overflow-hidden">
                            <div class="overflow-x-auto">
                                <table class="min-w-full divide-y-4 divide-black">
                                    <thead class="bg-purple-400">
                                        <tr>
                                            <th class="px-6 py-5 text-left text-sm font-black text-white uppercase tracking-wider border-r-4 border-black">Entidad</th>
                                            <th class="px-6 py-5 text-left text-sm font-black text-white uppercase tracking-wider border-r-4 border-black">Naturaleza Base</th>
                                            <th class="px-6 py-5 text-left text-sm font-black text-white uppercase tracking-wider border-r-4 border-black">Fines Principales</th>
                                            <th class="px-6 py-5 text-left text-sm font-black text-white uppercase tracking-wider border-r-4 border-black">Diseño / Estructura</th>
                                            <th class="px-6 py-5 text-left text-sm font-black text-white uppercase tracking-wider">Origen Clave</th>
                                        </tr>
                                    </thead>
                                    <tbody class="bg-white divide-y-2 divide-black/20">
                                        ${comparativeData.map((row) => `
                                            <tr class="hover:bg-purple-50">
                                                <td class="px-6 py-5 text-base font-black text-black border-r-4 border-black bg-purple-100/50">${row.entidad}</td>
                                                <td class="px-6 py-5 text-sm text-black font-bold border-r-4 border-black">
                                                    <span class="bg-white px-3 py-1 rounded-lg border-2 border-black block text-center shadow-[2px_2px_0px_0px_rgba(0,0,0,1)]">${row.naturaleza}</span>
                                                </td>
                                                <td class="px-6 py-5 text-sm text-black font-medium border-r-4 border-black">${row.fines}</td>
                                                <td class="px-6 py-5 text-sm text-black font-medium border-r-4 border-black">${row.estructura}</td>
                                                <td class="px-6 py-5 text-sm text-black font-bold italic bg-yellow-50">${row.origen}</td>
                                            </tr>
                                        `).join('')}
                                    </tbody>
                                </table>
                            </div>
                        </div>
                        
                        <div class="bg-cyan-200 p-6 rounded-2xl border-4 border-black shadow-[6px_6px_0px_0px_rgba(0,0,0,1)] mt-8 transform md:rotate-1">
                            <h3 class="flex items-center gap-3 text-xl font-black text-black mb-3">
                                <i data-lucide="info" class="w-6 h-6 text-black"></i> ¡Alerta de Cátedra!
                            </h3>
                            <p class="text-black font-medium text-sm md:text-base leading-relaxed">
                                Este cuadro resume las características ideales de cada estructura ("Tipos Ideales" en términos sociológicos). En la realidad práctica, las fronteras pueden ser difusas. ¡Recuerda que una Asociación Civil puede organizarse internamente como una Empresa para ser más eficiente!
                            </p>
                        </div>
                    </div>
                `;
            } else {
                const data = academicData[activeTab];

                // Acordeón con ejemplos integrados de manera llamativa
                const accordionHtml = data.types.map((type, index) => {
                    const isOpen = openAccordionIndex === index;
                    return `
                        <div class="border-4 border-black rounded-2xl overflow-hidden bg-white shadow-[4px_4px_0px_0px_rgba(0,0,0,1)] transition-all duration-200 mb-4">
                            <button
                                onclick="toggleAccordion(${index})"
                                class="w-full flex justify-between items-center p-4 text-left font-black text-black ${accordionColors[index % accordionColors.length]} hover:brightness-95 focus:outline-none transition-all"
                            >
                                <span class="flex items-center gap-3 text-sm md:text-lg">
                                    <span class="p-1 bg-white border-2 border-black rounded-full flex-shrink-0">
                                        <i data-lucide="book-open" class="w-4 h-4 text-black"></i>
                                    </span>
                                    ${type.name}
                                </span>
                                <i data-lucide="${isOpen ? 'chevron-up' : 'chevron-down'}" class="w-6 h-6 text-black font-bold flex-shrink-0"></i>
                            </button>
                            <div class="transition-all duration-300 ease-in-out ${isOpen ? 'max-h-96 opacity-100 border-t-4 border-black' : 'max-h-0 opacity-0 hidden'} bg-white">
                                <div class="p-5 text-black font-medium text-sm md:text-base leading-relaxed flex flex-col gap-3">
                                    <p>${type.desc}</p>
                                    <div class="bg-yellow-100 border-2 border-black rounded-xl p-3 text-sm md:text-base font-bold text-black shadow-[2px_2px_0px_0px_rgba(0,0,0,1)]">
                                        ${type.example}
                                    </div>
                                </div>
                            </div>
                        </div>
                    `;
                }).join('');

                const tableHtml = data.examples.map(item => `
                    <tr class="hover:bg-green-50 transition-colors">
                        <td class="px-6 py-4 text-sm font-bold text-black border-r-4 border-black">${item.name}</td>
                        <td class="px-6 py-4 text-sm font-black text-blue-600 border-r-4 border-black">
                            <span class="bg-blue-100 px-3 py-1 rounded-full border-2 border-black whitespace-nowrap">${item.category}</span>
                        </td>
                        <td class="px-6 py-4 text-sm text-black font-medium leading-relaxed min-w-[250px]">${item.detail}</td>
                    </tr>
                `).join('');

                contentArea.innerHTML = `
                    <div class="space-y-10 animate-fade-in">
                        <div class="flex flex-col md:flex-row items-center md:items-start gap-5 mb-8 pb-8 border-b-4 border-black text-center md:text-left">
                            <div class="p-4 bg-pink-400 text-white rounded-2xl border-4 border-black shadow-[4px_4px_0px_0px_rgba(0,0,0,1)] transform -rotate-6 inline-block">
                                <i data-lucide="${data.icon}" class="w-8 h-8"></i>
                            </div>
                            <h2 class="text-3xl md:text-5xl font-black text-black uppercase tracking-tight mt-2 md:mt-0">${data.title}</h2>
                        </div>

                        <!-- Definición y Objetivo -->
                        <div class="grid md:grid-cols-2 gap-8">
                            <div class="bg-yellow-300 p-6 md:p-8 rounded-3xl border-4 border-black shadow-[8px_8px_0px_0px_rgba(0,0,0,1)] hover:-translate-y-1 hover:shadow-[10px_10px_0px_0px_rgba(0,0,0,1)] transition-all">
                                <h3 class="flex items-center gap-3 text-xl font-black text-black mb-4 uppercase">
                                    <span class="p-2 bg-white rounded-full border-2 border-black"><i data-lucide="info" class="w-5 h-5"></i></span>
                                    Definición
                                </h3>
                                <p class="text-black font-medium leading-relaxed text-sm md:text-base">
                                    ${data.definition}
                                </p>
                            </div>
                            <div class="bg-cyan-300 p-6 md:p-8 rounded-3xl border-4 border-black shadow-[8px_8px_0px_0px_rgba(0,0,0,1)] hover:-translate-y-1 hover:shadow-[10px_10px_0px_0px_rgba(0,0,0,1)] transition-all">
                                <h3 class="flex items-center gap-3 text-xl font-black text-black mb-4 uppercase">
                                    <span class="p-2 bg-white rounded-full border-2 border-black"><i data-lucide="target" class="w-5 h-5"></i></span>
                                    Objetivo
                                </h3>
                                <p class="text-black font-medium leading-relaxed text-sm md:text-base">
                                    ${data.objective}
                                </p>
                            </div>
                        </div>

                        <!-- Origen, Fines y Estructura -->
                        <div class="bg-purple-200 border-4 border-black rounded-3xl shadow-[8px_8px_0px_0px_rgba(0,0,0,1)] p-6 md:p-8">
                            <h3 class="flex items-center gap-3 text-2xl font-black text-black mb-8 uppercase">
                                <span class="p-2 bg-white rounded-xl border-2 border-black transform rotate-3"><i data-lucide="git-merge" class="w-6 h-6"></i></span>
                                ADN de la Estructura
                            </h3>
                            <div class="grid md:grid-cols-3 gap-6">
                                <div class="bg-white p-5 rounded-2xl border-4 border-black shadow-[4px_4px_0px_0px_rgba(0,0,0,1)]">
                                    <h4 class="font-black text-xl text-black mb-2 border-b-4 border-black pb-2">1. Origen</h4>
                                    <p class="text-sm md:text-base text-black font-medium leading-relaxed pt-2">${data.origin}</p>
                                </div>
                                <div class="bg-white p-5 rounded-2xl border-4 border-black shadow-[4px_4px_0px_0px_rgba(0,0,0,1)]">
                                    <h4 class="font-black text-xl text-black mb-2 border-b-4 border-black pb-2">2. Fines</h4>
                                    <p class="text-sm md:text-base text-black font-medium leading-relaxed pt-2">${data.ends}</p>
                                </div>
                                <div class="bg-white p-5 rounded-2xl border-4 border-black shadow-[4px_4px_0px_0px_rgba(0,0,0,1)]">
                                    <h4 class="font-black text-xl text-black mb-2 border-b-4 border-black pb-2">3. Diseño</h4>
                                    <p class="text-sm md:text-base text-black font-medium leading-relaxed pt-2">${data.structure}</p>
                                </div>
                            </div>
                        </div>

                        <!-- Tipologías (Acordeón) -->
                        <div class="pt-4">
                            <div class="inline-block bg-black text-white px-4 py-2 font-black uppercase tracking-widest rounded-t-xl ml-4">
                                Clasificación Explicada
                            </div>
                            <div class="bg-white p-4 md:p-6 border-4 border-black rounded-3xl shadow-[8px_8px_0px_0px_rgba(0,0,0,1)]">
                                <p class="text-black font-bold text-sm mb-4 bg-yellow-100 inline-block px-3 py-1 border-2 border-black rounded-lg">👇 Haz clic en cada uno para ver su desarrollo y un ejemplo clave.</p>
                                <div class="mt-2">
                                    ${accordionHtml}
                                </div>
                            </div>
                        </div>

                        <!-- Ejemplos Prácticos (Tabla) -->
                        <div class="pt-8">
                            <h3 class="text-2xl md:text-3xl font-black text-black mb-4 uppercase">Grandes Casos 🌎</h3>
                            <div class="overflow-x-auto mt-4 rounded-2xl border-4 border-black shadow-[6px_6px_0px_0px_rgba(0,0,0,1)] bg-white">
                                <table class="min-w-full divide-y-4 divide-black">
                                    <thead class="bg-green-300">
                                        <tr>
                                            <th class="px-6 py-4 text-left text-xs md:text-sm font-black text-black uppercase tracking-widest border-r-4 border-black">Entidad / Organización</th>
                                            <th class="px-6 py-4 text-left text-xs md:text-sm font-black text-black uppercase tracking-widest border-r-4 border-black">Categoría</th>
                                            <th class="px-6 py-4 text-left text-xs md:text-sm font-black text-black uppercase tracking-widest">Análisis Detallado</th>
                                        </tr>
                                    </thead>
                                    <tbody class="bg-white divide-y-2 divide-black/20">
                                        ${tableHtml}
                                    </tbody>
                                </table>
                            </div>
                        </div>
                    </div>
                `;
            }

            lucide.createIcons();
        }

        document.addEventListener('DOMContentLoaded', () => {
            renderSidebar();
            renderContent();
            lucide.createIcons();
        });
    </script>
</body>
</html>
